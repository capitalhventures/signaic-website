<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Signaic - Platform upgrade in progress.">
  <title>Signaic | Maintenance</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F6F0;</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    .container {
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 2.5rem;
      user-select: none;
    }
    .logo .slash { color: #06b6d4; }
    .logo .ai { color: #06b6d4; }
    h1 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }
    .sub {
      color: #94a3b8;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .contact a {
      color: #06b6d4;
      text-decoration: none;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      transition: opacity 0.2s;
    }
    .contact a:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">SIG<span class="slash">/</span>N<span class="ai">AI</span>C</div>
    <h1>Platform Upgrade in Progress</h1>
    <p class="sub">Signaic is undergoing a major platform upgrade.</p>
    <p class="contact">For early access: <a href="mailto:ryan@capitalh.io">ryan@capitalh.io</a></p>
  </div>
</body>
</html>
